<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raise Grievance — SmartQueue</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --border:    #1e1e2e;
      --accent:    #00e5a0;
      --red:       #ff4d6d;
      --yellow:    #f9c846;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,229,160,.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(255,77,109,.05) 0%, transparent 60%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
      animation: slideUp .4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { margin-bottom: 2rem; text-align: center; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(255,77,109,.12);
      color: var(--red);
      border: 1px solid rgba(255,77,109,.25);
      border-radius: 999px;
      padding: .35rem .9rem;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: .5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.5;
    }

    /* ── Form ── */
    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    input, textarea, select {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.1);
    }

    textarea { resize: vertical; min-height: 110px; }

    select option { background: #1a1a2e; }

    /* char counter */
    .field-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: .35rem;
    }
    .char-count { font-size: .75rem; color: var(--muted); }
    .char-count.warn { color: var(--yellow); }
    .char-count.ok   { color: var(--accent); }

    /* ── Button ── */
    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      padding: .9rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: .5rem;
      position: relative;
    }

    button[type="submit"]:hover  { opacity: .88; }
    button[type="submit"]:active { transform: scale(.98); }
    button[type="submit"]:disabled { opacity: .45; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alert boxes ── */
    .alert {
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      font-size: .9rem;
      line-height: 1.5;
      margin-top: 1.25rem;
      display: none;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .alert.success {
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.3);
      color: var(--accent);
      display: block;
    }
    .alert.error {
      background: rgba(255,77,109,.1);
      border: 1px solid rgba(255,77,109,.3);
      color: var(--red);
      display: block;
    }
    .alert .alert-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: .3rem;
    }

    /* success state */
    .success-card {
      text-align: center;
      padding: 1rem 0;
      display: none;
    }
    .success-icon {
      width: 60px; height: 60px;
      background: rgba(0,229,160,.15);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.6rem;
    }
    .success-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: .5rem;
    }
    .grievance-id {
      display: inline-block;
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.25);
      color: var(--accent);
      border-radius: 8px;
      padding: .4rem .9rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      margin: .75rem 0;
      font-size: 1.1rem;
    }
    .success-note { color: var(--muted); font-size: .85rem; line-height: 1.5; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- FORM VIEW -->
  <div id="formView">
    <div class="header">
      <div class="badge">⚠ Emergency Appeal</div>
      <h1>Raise a Grievance</h1>
      <p class="subtitle">File an appeal if your emergency claim was incorrectly rejected. Appeals must be filed within 30 minutes.</p>
    </div>

    <div class="divider"></div>

    <form id="grievanceForm" novalidate>

      <div class="field">
        <label>Token Number</label>
        <input type="text" id="token" placeholder="e.g. HEA-GEN-0042" required />
      </div>

      <div class="field">
        <label>Registered Phone</label>
        <input type="tel" id="phone" placeholder="+91XXXXXXXXXX" required />
      </div>

      <div class="field">
        <label>Reason Category</label>
        <select id="reason_code">
          <option value="chest_pain">Chest Pain / Cardiac</option>
          <option value="accident">Accident / Trauma</option>
          <option value="breathing">Breathing Difficulty</option>
          <option value="other" selected>Other Emergency</option>
        </select>
      </div>

      <div class="field">
        <label>Describe Your Emergency</label>
        <textarea id="description" placeholder="Please describe your emergency in detail (minimum 20 characters)..." required></textarea>
        <div class="field-footer">
          <span class="char-count" id="charCount">0 / 20 min</span>
        </div>
      </div>

      <button type="submit" id="submitBtn">
        <span id="btnText">Submit Appeal</span>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <!-- Error / info message box -->
    <div class="alert" id="alertBox">
      <div class="alert-title" id="alertTitle"></div>
      <div id="alertMsg"></div>
    </div>
  </div>

  <!-- SUCCESS VIEW -->
  <div class="success-card" id="successView">
    <div class="success-icon">✓</div>
    <h2>Appeal Submitted!</h2>
    <p class="success-note">Your grievance ID is:</p>
    <div class="grievance-id" id="grievanceIdDisplay">#—</div>
    <p class="success-note" id="successMessage">Admin will review shortly. You will receive an SMS with the decision.</p>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8080";

  // ── Char counter ──
  const descEl      = document.getElementById("description");
  const charCountEl = document.getElementById("charCount");

  descEl.addEventListener("input", () => {
    const len = descEl.value.trim().length;
    charCountEl.textContent = `${len} / 20 min`;
    charCountEl.className   = "char-count" + (len >= 20 ? " ok" : len > 10 ? " warn" : "");
  });

  // ── Alert helper ──
  function showAlert(type, title, message) {
    const box = document.getElementById("alertBox");
    box.className       = `alert ${type}`;
    document.getElementById("alertTitle").textContent = title;
    document.getElementById("alertMsg").textContent   = message;
  }

  function hideAlert() {
    document.getElementById("alertBox").className = "alert";
  }

  // ── Submit ──
  document.getElementById("grievanceForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideAlert();

    const token       = document.getElementById("token").value.trim();
    const phone       = document.getElementById("phone").value.trim();
    const description = document.getElementById("description").value.trim();
    const reason_code = document.getElementById("reason_code").value;

    // ── Client-side validation ──
    if (!token) return showAlert("error", "Missing Field", "Please enter your token number.");
    if (!phone || phone.length < 10) return showAlert("error", "Invalid Phone", "Please enter a valid phone number (min 10 digits).");
    if (description.length < 20) return showAlert("error", "Too Short", "Please describe your emergency in at least 20 characters.");

    // ── Loading state ──
    const btn     = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    const spinner = document.getElementById("spinner");
    btn.disabled     = true;
    btnText.style.display  = "none";
    spinner.style.display  = "block";

    try {
      const res = await fetch(`${API}/api/grievance/submit`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token_number: token, phone, description, reason_code })
      });

      // ── FIX: parse response correctly ──
      const result = await res.json();

      if (res.ok) {
        // SUCCESS — show success card
        document.getElementById("formView").style.display       = "none";
        document.getElementById("successView").style.display    = "block";
        document.getElementById("grievanceIdDisplay").textContent = `#${result.grievance_id}`;
        document.getElementById("successMessage").textContent   = result.message || "Admin will review shortly.";
      } else {
        // ERROR — result.detail is FastAPI's error format
        const errMsg = result.detail || result.message || "Something went wrong. Please try again.";

        // Give helpful hints for common backend errors
        let hint = "";
        if (errMsg.includes("not rejected as an emergency")) {
          hint = " → Your token was not flagged as an emergency rejection. This form is only for emergency claim appeals.";
        } else if (errMsg.includes("Appeal window has closed")) {
          hint = " → The 30-minute appeal window has expired.";
        } else if (errMsg.includes("Phone number does not match")) {
          hint = " → Make sure you enter the phone number you used when booking.";
        } else if (errMsg.includes("already have a pending appeal")) {
          hint = " → You already filed an appeal. Please wait for admin review.";
        }

        showAlert("error", `Error ${res.status}`, errMsg + hint);
      }

    } catch (err) {
      // Network / CORS / server down
      showAlert(
        "error",
        "Connection Failed",
        `Could not reach the server at ${API}. Make sure your FastAPI server is running.`
      );
      console.error(err);
    } finally {
      btn.disabled          = false;
      btnText.style.display = "inline";
      spinner.style.display = "none";
    }
  });
</script>

</body>
</html>
